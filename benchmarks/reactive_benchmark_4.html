<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="ISO-8859-1">
    <title>Seanox aspect-js test environment</title>
    <style>
      body {
        font-family: monospace;
      }
    </style>
    <script src="aspect-js.js"></script>
    <script type="text/javascript">

        Test.activate();

        // Benchmark 4: Granular Reactive Update
        //
        // Renders 10,000 flat DOM nodes and then updates exactly one reactive
        // value in the middle of the list (index 5000).
        //
        // The benchmark measures whether the reactive system invalidates only
        // the affected binding or unnecessarily re-evaluates unrelated nodes.
        //
        // Ideal:
        //   State change -> one dependency -> one text node update.
        //
        // Poor implementations:
        //   State change -> list re-evaluation -> many template executions -> many DOM checks.
        //
        // This benchmark primarily evaluates:
        // - dependency tracking
        // - update granularity
        // - scheduler overhead
        // - incremental DOM update performance
        //
        // Blink    max.  50 ms   i5-1240P
        // WebKit   max.  75 ms   A14 (iPad Gen 10)
        // goanna   max. 200 ms   i5-1240P
        // Gecko    max.  50 ms   i5-1240P

        const state = {
            nodes: Array.from({length: 10000}, (_, i) => ({value: i}))
        }.reactive();
        const result = {duration: ""}.reactive();

        let phase = 0;
        let timing;

        Composite.listen(Composite.EVENT_RENDER_END, () => {
            phase++;
            if (phase === 1) {
                timing = performance.now();
                state.nodes[5000].value++;
            } else if (phase === 2) {
                const elapsed = performance.now() -timing;
                let timeout;
                if (navigator.engine === "blink")
                    timeout = 50;
                if (navigator.engine === "webkit")
                    timeout = 75;
                if (navigator.engine === "goanna")
                    timeout = 200;
                if (navigator.engine === "gecko")
                    timeout = 50;
                result.duration = `Duration ${elapsed.toFixed(2)} ms`;
                Test.create({timeout:timeout, test() {
                    const message = `${elapsed.toFixed(2)} ms (expected max. ${timeout} ms)`;
                    console.log(`Benchmark Mid-Tree Update: ${message}`);
                    Assert.assertTrue(`Duration ${message}`, elapsed < timeout);                    
                }});
                Test.start();
            }
        });
    </script>
  </head>
  <body>
    Info: Output is hidden
    <div iterate="{{node:state.nodes}}" style="display:none;">{{node.item.value}}</div>
    <p id="duration">{{result.duration}}</p>
  </body>
</html>
