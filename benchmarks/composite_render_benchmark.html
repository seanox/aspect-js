<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="ISO-8859-1">
    <title>Seanox aspect-js test environment</title>
    <style>
      body {
        font-family: monospace;
      }
      body div {
        display: inline;
      }
    </style>
    <script src="aspect-js.js"></script>
    <script type="text/javascript">
    
        Test.activate();

        // Blink    max.  300   i5-1240P
        // WebKit   max.  375   A14 (iPad Gen 10)
        // goanna   max. 2250   i5-1240P
        // Gecko    max.  325   i5-1240P

        let timing = Date.now();
        Composite.listen(Composite.EVENT_RENDER_END, () => {
            timing = Date.now() -timing;
            let timeout1;
            if (navigator.engine === "blink")
                timeout1 = 300;
            if (navigator.engine === "webkit")
                timeout1 = 375;
            if (navigator.engine === "goanna")
                timeout1 = 2250;
            if (navigator.engine === "gecko")
                timeout1 = 325;
            Test.create({test() {
                const message = `${timing} ms (expected max. ${timeout1} ms)`;
                console.log(`Duration: ${message}`);
                Assert.assertTrue(`Duration ${message}`, timing < timeout1);
            }});
            Test.start();
        });       
    </script>
  </head>
  <body>
    {{x:10}}
    {{s:0}}
    Info: Output is hidden
    <div iterate="{{a:new Array(x)}}" style="display:none;">
      A:{{a.index}}
      {{s:s +1}}
      <div iterate="{{b:new Array(x)}}">
        B:{{b.index}}
        {{s:s +1}}
        <div iterate="{{c:new Array(x)}}">
          C:{{c.index}}
          {{s:s +1}}
          <div iterate="{{d:new Array(x)}}">
            D:{{d.index}}
            {{s:s +1}}
          </div>
        </div>
      </div>
    </div>
    <hr/>
    {{s}}
  </body>
</html>
