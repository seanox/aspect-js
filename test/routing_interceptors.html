<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="ISO-8859-1">
    <title>Seanox aspect-js test environment</title>
    <style>
      body {
        font-family: monospace;
        white-space: pre;
      }
    </style>
    <script src="aspect-js.js"></script>
    <script type="text/javascript">
    
        Test.activate();

        let _actors = "!";
        const modelX = {
            get actors() {
                return _actors;
            }
        }
        Routing.customize(/\bc\b/, () => {
            _actors += "1";
            return false;
        });
        Routing.customize("#a", () => {
            _actors += "2";
        });
        Routing.customize("#b", () => {
            _actors += "3";
        });
        Routing.customize(/\bc\b/, () => {
            _actors += "4";
            Routing.route("#x");
            return false;
        });

        let _sequence = ["#a", "#b#c", "#a#b#c", "#c#d", "#b#x", "#a#b#c", "#a", "#c#d", "#a#b#c", "#b#x"];
        const _snapshots = [];
        const runSequence = () => {
            window.setTimeout(() => {
                _snapshots.push(document.body.innerText.replace(/\s+/g, ""));
                if (_sequence.length <= 0) {
                    document.body.innerText = _snapshots.join("\r\n");
                    Test.start();
                    return;
                }
                Routing.route(_sequence.shift());
                runSequence();
            }, 250);
        };
        runSequence();

        Test.create({test() {
            const content = _snapshots.join("\r\n");
            Assert.assertSameTo("script[type='text/test']", content);
        }});
    </script>
    <script type="text/test">
      0!
      1!2
      1!2
      1!2
      1!2
      5!21113
      5!21113
      7!2111312
      7!2111312
      7!2111312
      10!2111312113
    </script>
  </head>
  <body route>
    {{_snapshots.length}}
    {{modelX.actors}}
  </body>
</html>
